server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/life_planner}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:change-me-life-planner-dev-secret}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:86400}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
  dev-seed:
    enabled: ${APP_DEV_SEED_ENABLED:true}
  push:
    vapid:
      public-key: ${APP_PUSH_VAPID_PUBLIC_KEY:}
      private-key: ${APP_PUSH_VAPID_PRIVATE_KEY:}
      subject: ${APP_PUSH_VAPID_SUBJECT:mailto:admin@lifeplanner.local}
