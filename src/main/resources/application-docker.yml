server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/lifeplanner
    username: lifeplanner_user
    password: ${POSTGRES_PASSWORD}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  frontend-url: ${APP_FRONTEND_URL:https://lifeplanner.gesu.gay}

  dev-seed:
    enabled: ${APP_DEV_SEED_ENABLED:false}

  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}

  push:
    vapid:
      public-key: ${APP_PUSH_VAPID_PUBLIC_KEY:}
      private-key: ${APP_PUSH_VAPID_PRIVATE_KEY:}
      subject: ${APP_PUSH_VAPID_SUBJECT:mailto:admin@lifeplanner.local}
